<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <style id="theme-vars">
/* Source: structured-spec */
/* Brand profile: google / dashboard / clean / analytical / modern */
/* Theme mode: light-dark */
/* Alias layer: enabled */

/* Light mode source tokens */
:root {
  /* Core surface colors */
  --background: #ffffff;
  --foreground: #0e1115;
  --card: #ffffff;
  --card-foreground: #0e1115;
  --popover: #f9f9fa;
  --popover-foreground: #0e1115;

  /* Semantic action colors */
  --primary: #4285f4;
  --primary-foreground: #ffffff;
  --secondary: #dbeafe;
  --secondary-foreground: #333942;
  --muted: #eff1f4;
  --muted-foreground: #7f8d9f;
  --accent: #dbeafe;
  --accent-foreground: #003e8f;
  --destructive: #ef4444;
  --destructive-foreground: #ffffff;

  /* Borders, inputs, focus */
  --border: #ebebeb;
  --input: #e2e3e4;
  --ring: #4285f4;

  /* Data visualization */
  --chart-1: #4285f4;
  --chart-2: #ea4335;
  --chart-3: #fbbc05;
  --chart-4: #0043ad;
  --chart-5: #34a853;

  /* Sidebar */
  --sidebar: #f0f6ff;
  --sidebar-foreground: #0e1115;
  --sidebar-primary: #4285f4;
  --sidebar-primary-foreground: #ffffff;
  --sidebar-accent: #dbeafe;
  --sidebar-accent-foreground: #003e8f;
  --sidebar-border: #e7eaef;
  --sidebar-ring: #4285f4;

  /* Typography */
  --font-sans: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-serif: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-mono: JetBrains Mono, monospace;

  /* Radius */
  --radius: 0.5rem;

  /* Shadow primitives */
  --shadow-x: 0;
  --shadow-y: 3px;
  --shadow-blur: 0px;
  --shadow-spread: 0px;
  --shadow-opacity: 0;
  --shadow-color: #0e1115;

  /* Elevation */
  --shadow-2xs: 0 3px 0px 0px rgba(14, 17, 21, 0);
  --shadow-xs: 0 3px 0px 0px rgba(14, 17, 21, 0);
  --shadow-sm: 0 3px 0px 0px rgba(14, 17, 21, 0), 0 1px 2px -1px rgba(14, 17, 21, 0);
  --shadow: 0 3px 0px 0px rgba(14, 17, 21, 0), 0 1px 2px -1px rgba(14, 17, 21, 0);
  --shadow-md: 0 3px 0px 0px rgba(14, 17, 21, 0), 0 2px 4px -1px rgba(14, 17, 21, 0);
  --shadow-lg: 0 3px 0px 0px rgba(14, 17, 21, 0), 0 4px 6px -1px rgba(14, 17, 21, 0);
  --shadow-xl: 0 3px 0px 0px rgba(14, 17, 21, 0), 0 8px 10px -1px rgba(14, 17, 21, 0);
  --shadow-2xl: 0 3px 0px 0px rgba(14, 17, 21, 0);

  /* Rhythm */
  --tracking-normal: 0em;
  --spacing: 0.24rem;

  /* Alias layer */
  --google-color-background: var(--background);
  --google-color-foreground: var(--foreground);
  --google-color-card: var(--card);
  --google-color-card-foreground: var(--card-foreground);
  --google-color-popover: var(--popover);
  --google-color-popover-foreground: var(--popover-foreground);
  --google-color-primary: var(--primary);
  --google-color-primary-foreground: var(--primary-foreground);
  --google-color-secondary: var(--secondary);
  --google-color-secondary-foreground: var(--secondary-foreground);
  --google-color-muted: var(--muted);
  --google-color-muted-foreground: var(--muted-foreground);
  --google-color-accent: var(--accent);
  --google-color-accent-foreground: var(--accent-foreground);
  --google-color-destructive: var(--destructive);
  --google-color-destructive-foreground: var(--destructive-foreground);
  --google-color-border: var(--border);
  --google-color-input: var(--input);
  --google-color-ring: var(--ring);
  --google-color-chart-1: var(--chart-1);
  --google-color-chart-2: var(--chart-2);
  --google-color-chart-3: var(--chart-3);
  --google-color-chart-4: var(--chart-4);
  --google-color-chart-5: var(--chart-5);
  --google-color-sidebar: var(--sidebar);
  --google-color-sidebar-foreground: var(--sidebar-foreground);
  --google-color-sidebar-primary: var(--sidebar-primary);
  --google-color-sidebar-primary-foreground: var(--sidebar-primary-foreground);
  --google-color-sidebar-accent: var(--sidebar-accent);
  --google-color-sidebar-accent-foreground: var(--sidebar-accent-foreground);
  --google-color-sidebar-border: var(--sidebar-border);
  --google-color-sidebar-ring: var(--sidebar-ring);
  --google-font-sans: var(--font-sans);
  --google-font-serif: var(--font-serif);
  --google-font-mono: var(--font-mono);
  --google-radius: var(--radius);
  --google-radius-sm: calc(var(--radius) - 4px);
  --google-radius-md: calc(var(--radius) - 2px);
  --google-radius-lg: var(--radius);
  --google-radius-xl: calc(var(--radius) + 4px);
  --google-shadow-x: var(--shadow-x);
  --google-shadow-y: var(--shadow-y);
  --google-shadow-blur: var(--shadow-blur);
  --google-shadow-spread: var(--shadow-spread);
  --google-shadow-opacity: var(--shadow-opacity);
  --google-shadow-color: var(--shadow-color);
  --google-shadow-2xs: var(--shadow-2xs);
  --google-shadow-xs: var(--shadow-xs);
  --google-shadow-sm: var(--shadow-sm);
  --google-shadow: var(--shadow);
  --google-shadow-md: var(--shadow-md);
  --google-shadow-lg: var(--shadow-lg);
  --google-shadow-xl: var(--shadow-xl);
  --google-shadow-2xl: var(--shadow-2xl);
  --google-tracking-normal: var(--tracking-normal);
  --google-spacing: var(--spacing);
}

/* Dark mode source tokens */
.dark {
  /* Core surface colors */
  --background: #161616;
  --foreground: #eff1f4;
  --card: #1d1d1c;
  --card-foreground: #eff1f4;
  --popover: #2e2e2e;
  --popover-foreground: #e5e5e5;

  /* Semantic action colors */
  --primary: #fc2c50;
  --primary-foreground: #ffffff;
  --secondary: #383838;
  --secondary-foreground: #e5e5e5;
  --muted: #383838;
  --muted-foreground: #949494;
  --accent: #4a2026;
  --accent-foreground: #fc2c50;
  --destructive: #ef4444;
  --destructive-foreground: #ffffff;

  /* Borders, inputs, focus */
  --border: #1d1d1c;
  --input: #000000;
  --ring: #ffffff;

  /* Data visualization */
  --chart-1: #2dccd3;
  --chart-2: #f1204a;
  --chart-3: #edbbe8;
  --chart-4: #fbeb35;
  --chart-5: #baf6f0;

  /* Sidebar */
  --sidebar: #171717;
  --sidebar-foreground: #e5e5e5;
  --sidebar-primary: #0065fd;
  --sidebar-primary-foreground: #ffffff;
  --sidebar-accent: #00266b;
  --sidebar-accent-foreground: #bfdbfe;
  --sidebar-border: #404040;
  --sidebar-ring: #00266b;

  /* Typography */
  --font-sans: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-serif: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-mono: JetBrains Mono, monospace;

  /* Radius */
  --radius: 0.5rem;

  /* Shadow primitives */
  --shadow-x: 0;
  --shadow-y: 3px;
  --shadow-blur: 0px;
  --shadow-spread: 0px;
  --shadow-opacity: 0;
  --shadow-color: #000000;

  /* Elevation */
  --shadow-2xs: 0 3px 0px 0px rgba(0, 0, 0, 0);
  --shadow-xs: 0 3px 0px 0px rgba(0, 0, 0, 0);
  --shadow-sm: 0 3px 0px 0px rgba(0, 0, 0, 0), 0 1px 2px -1px rgba(0, 0, 0, 0);
  --shadow: 0 3px 0px 0px rgba(0, 0, 0, 0), 0 1px 2px -1px rgba(0, 0, 0, 0);
  --shadow-md: 0 3px 0px 0px rgba(0, 0, 0, 0), 0 2px 4px -1px rgba(0, 0, 0, 0);
  --shadow-lg: 0 3px 0px 0px rgba(0, 0, 0, 0), 0 4px 6px -1px rgba(0, 0, 0, 0);
  --shadow-xl: 0 3px 0px 0px rgba(0, 0, 0, 0), 0 8px 10px -1px rgba(0, 0, 0, 0);
  --shadow-2xl: 0 3px 0px 0px rgba(0, 0, 0, 0);
}


    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  
  @layer base {
    body { background: var(--google-color-background); color: var(--google-color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="flex min-h-screen items-center justify-center p-4" style="background-color: var(--google-color-background);">
        <!-- Login Card -->
        <div class="max-w-sm w-full mx-auto rounded-2xl p-6 md:p-8 shadow-sm" style="background-color: var(--google-color-card); border: 1px solid var(--google-color-border);">

            <!-- Back to Landing -->
            <a data-dom-id="back-to-landing" href="#" class="mb-4 inline-flex items-center gap-1 text-xs transition-colors hover:opacity-70" style="color: var(--google-color-muted-foreground);">
                <i data-lucide="arrow-left" class="h-3.5 w-3.5"></i>
                <span>返回</span>
            </a>

            <!-- Logo Row -->
            <div class="mb-6 flex items-center gap-3">
                <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-zinc-900">
                    <span class="text-sm font-bold text-white">BD</span>
                </div>
                <span class="text-lg font-semibold" style="color: var(--google-color-foreground);">BunkDesk</span>
            </div>

            <!-- Title -->
            <h1 class="text-xl font-semibold" style="color: var(--google-color-foreground);">选择用户登录</h1>

            <!-- Subtitle -->
            <p class="mt-1 text-sm" style="color: var(--google-color-muted-foreground);">请选择你的身份</p>

            <!-- Staff List -->
            <div class="mt-6 flex flex-col gap-2">

                <!-- Staff 1: 陈经理 (Manager) -->
                <button data-dom-id="login-submit" class="flex w-full cursor-pointer items-center gap-3 rounded-xl px-4 py-3 transition-colors hover:bg-[var(--google-color-accent)]" style="border: 1px solid var(--google-color-border); background-color: transparent;">
                    <i data-lucide="user" class="h-5 w-5" style="color: var(--google-color-muted-foreground);"></i>
                    <span class="flex-1 text-left text-sm font-medium" style="color: var(--google-color-foreground);">陈经理</span>
                    <span class="rounded-full bg-amber-100 px-2 py-0.5 text-xs font-medium text-amber-700">经理</span>
                </button>

                <!-- Staff 2: 小李 (Reception) -->
                <button class="flex w-full cursor-pointer items-center gap-3 rounded-xl px-4 py-3 transition-colors hover:bg-[var(--google-color-accent)]" style="border: 1px solid var(--google-color-border); background-color: transparent;">
                    <i data-lucide="user" class="h-5 w-5" style="color: var(--google-color-muted-foreground);"></i>
                    <span class="flex-1 text-left text-sm font-medium" style="color: var(--google-color-foreground);">小李</span>
                    <span class="rounded-full bg-blue-100 px-2 py-0.5 text-xs font-medium text-blue-700">前台</span>
                </button>

                <!-- Staff 3: 王阿姨 (Cleaning) -->
                <button class="flex w-full cursor-pointer items-center gap-3 rounded-xl px-4 py-3 transition-colors hover:bg-[var(--google-color-accent)]" style="border: 1px solid var(--google-color-border); background-color: transparent;">
                    <i data-lucide="user" class="h-5 w-5" style="color: var(--google-color-muted-foreground);"></i>
                    <span class="flex-1 text-left text-sm font-medium" style="color: var(--google-color-foreground);">王阿姨</span>
                    <span class="rounded-full bg-purple-100 px-2 py-0.5 text-xs font-medium text-purple-700">保洁</span>
                </button>

                <!-- Staff 4: 小张 (Reception) -->
                <button class="flex w-full cursor-pointer items-center gap-3 rounded-xl px-4 py-3 transition-colors hover:bg-[var(--google-color-accent)]" style="border: 1px solid var(--google-color-border); background-color: transparent;">
                    <i data-lucide="user" class="h-5 w-5" style="color: var(--google-color-muted-foreground);"></i>
                    <span class="flex-1 text-left text-sm font-medium" style="color: var(--google-color-foreground);">小张</span>
                    <span class="rounded-full bg-blue-100 px-2 py-0.5 text-xs font-medium text-blue-700">前台</span>
                </button>

            </div>

            <!-- Hint Text -->
            <p class="mt-4 text-center text-xs" style="color: var(--google-color-muted-foreground);">选择用户后输入 PIN 码</p>

        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
